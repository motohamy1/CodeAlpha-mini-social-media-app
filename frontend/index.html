<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aperture Social - A sleek, premium dark-mode canvas for visual creators.">
  <title>Aperture Social</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="dark-theme">
  <!-- Auth View (Shown when logged out) -->
  <div id="auth-view" class="view-container">
    <div class="auth-card">
      <div class="auth-brand">
        <svg class="brand-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          <path d="M2 12h20"/>
        </svg>
        <h1>Aperture</h1>
        <p>A canvas for visual creators</p>
      </div>

      <!-- Auth Tabs -->
      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active">Log In</button>
        <button id="tab-register" class="auth-tab">Register</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="login-identifier">Username or Email</label>
          <input type="text" id="login-identifier" required placeholder="Enter username or email" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="Enter password" autocomplete="current-password">
        </div>
        <div class="auth-error-msg hidden" id="login-error"></div>
        <button type="submit" class="btn-primary">Log In</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form hidden">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" required placeholder="e.g. elena_lens" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" required placeholder="e.g. elena@aperture.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="reg-display-name">Display Name (Optional)</label>
          <input type="text" id="reg-display-name" placeholder="e.g. Elena Rostova">
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" required placeholder="Create password" autocomplete="new-password">
        </div>
        <div class="auth-error-msg hidden" id="reg-error"></div>
        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <!-- Guest mode or Seeding credentials tip -->
      <div class="auth-tip">
        <p>Demo accounts (password: <code>password123</code>):</p>
        <div class="demo-chips">
          <button type="button" class="demo-chip-btn" data-user="elena_lens">elena_lens</button>
          <button type="button" class="demo-chip-btn" data-user="lucas_pixels">lucas_pixels</button>
          <button type="button" class="demo-chip-btn" data-user="sara_shapes">sara_shapes</button>
        </div>
      </div>
    </div>
  </div>

  <!-- App Shell (Shown when logged in) -->
  <div id="app-shell" class="view-container hidden">
    <!-- Sidebar Navigation (Desktop) -->
    <aside class="sidebar-nav">
      <div class="nav-brand">
        <svg class="brand-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          <path d="M2 12h20"/>
        </svg>
        <span>Aperture</span>
      </div>

      <nav class="nav-links">
        <button class="nav-link active" id="nav-feed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Feed</span>
        </button>

        <button class="nav-link" id="nav-create-post">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          <span>Share Post</span>
        </button>

        <button class="nav-link" id="nav-profile">
          <div class="user-avatar-small" id="nav-avatar-img"></div>
          <span id="nav-username-label">Profile</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button id="btn-logout" class="nav-link logout-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>Log Out</span>
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top header for mobile -->
      <header class="mobile-header">
        <div class="nav-brand">
          <svg class="brand-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            <path d="M2 12h20"/>
          </svg>
          <span>Aperture</span>
        </div>
      </header>

      <!-- VIEW 1: FEED -->
      <section id="view-feed" class="content-section">
        <div class="feed-container" id="feed-posts-list">
          <!-- Posts will be rendered here dynamically -->
        </div>
      </section>

      <!-- VIEW 2: PROFILE -->
      <section id="view-profile" class="content-section hidden">
        <div class="profile-container">
          <!-- Profile Header -->
          <div class="profile-header-card">
            <div class="profile-avatar-wrapper">
              <img id="profile-avatar" src="" alt="User Avatar">
            </div>
            <div class="profile-details">
              <div class="profile-title-row">
                <h2 id="profile-display-name"></h2>
                <div class="profile-actions-wrapper">
                  <button id="btn-profile-follow" class="btn-primary hidden">Follow</button>
                  <button id="btn-profile-unfollow" class="btn-secondary hidden">Following</button>
                  <button id="btn-profile-edit" class="btn-secondary hidden">Edit Profile</button>
                </div>
              </div>
              <p class="profile-username" id="profile-username"></p>
              <div class="profile-stats">
                <span class="stat-item"><strong id="profile-posts-count">0</strong> posts</span>
                <span class="stat-item"><strong id="profile-followers-count">0</strong> followers</span>
                <span class="stat-item"><strong id="profile-following-count">0</strong> following</span>
              </div>
              <p class="profile-bio" id="profile-bio"></p>
            </div>
          </div>

          <!-- Edit Profile Inline Card (shown on click) -->
          <div id="edit-profile-card" class="edit-profile-card hidden">
            <h3>Edit Profile</h3>
            <form id="edit-profile-form">
              <div class="form-group">
                <label for="edit-display-name">Display Name</label>
                <input type="text" id="edit-display-name" required placeholder="Your Display Name">
              </div>
              <div class="form-group">
                <label for="edit-bio">Bio</label>
                <textarea id="edit-bio" rows="3" placeholder="Tell us about yourself..."></textarea>
              </div>
              <div class="edit-actions">
                <button type="button" id="btn-edit-cancel" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Save Changes</button>
              </div>
            </form>
          </div>

          <!-- Profile Posts Grid -->
          <div class="profile-posts-grid-header">
            <h3>Gallery</h3>
          </div>
          <div class="profile-posts-grid" id="profile-posts-grid">
            <!-- Grid posts will be rendered here dynamically -->
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav">
      <button class="bottom-nav-link active" id="mob-nav-feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>
      <button class="bottom-nav-link" id="mob-nav-create-post">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </button>
      <button class="bottom-nav-link" id="mob-nav-profile">
        <div class="user-avatar-small" id="mob-avatar-img"></div>
      </button>
    </nav>
  </div>

  <!-- Create Post Modal Dialog -->
  <dialog id="create-post-modal" class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Share a New Creation</h2>
        <button class="btn-close-modal" id="btn-close-create-post">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form id="create-post-form">
        <!-- File Dropzone -->
        <div class="upload-dropzone" id="upload-dropzone">
          <input type="file" id="post-image-file" name="image" accept="image/*" required class="hidden-input">
          <div class="dropzone-prompt" id="dropzone-prompt">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="upload-icon">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p>Drag and drop your image, or <span>browse</span></p>
            <span class="file-limits">Supports JPEG, PNG, WEBP (max 5MB)</span>
          </div>
          <div class="dropzone-preview hidden" id="dropzone-preview">
            <img id="image-preview" src="" alt="Preview">
            <button type="button" class="btn-remove-preview" id="btn-remove-preview">Remove</button>
          </div>
        </div>

        <div class="form-group">
          <label for="post-caption">Caption</label>
          <textarea id="post-caption" name="caption" rows="3" placeholder="Write a description or detail your process..."></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secondary" id="btn-cancel-create-post">Cancel</button>
          <button type="submit" class="btn-primary" id="btn-submit-post">Publish</button>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Comments Drawer Sheet -->
  <dialog id="comment-modal" class="modal-dialog comment-drawer">
    <div class="modal-content drawer-content">
      <div class="modal-header">
        <h2>Comments</h2>
        <button class="btn-close-modal" id="btn-close-comments">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Drawer Body (Scrollable Comments List) -->
      <div class="comments-list" id="comments-list-container">
        <!-- Comments will be rendered dynamically here -->
      </div>

      <!-- Drawer Footer (Write Comment) -->
      <div class="comments-input-area">
        <form id="comment-form">
          <input type="text" id="comment-input" required placeholder="Add a comment as a creator..." autocomplete="off">
          <button type="submit" class="btn-comment-send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>
    </div>
  </dialog>

  <!-- Client Script -->
  <script src="/app.js"></script>
</body>
</html>
